name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate (tsc + lint + test)
        run: pnpm -w check
        # apps/server typecheck runs `prisma generate`, which needs the datasource
        # env resolvable. .env is gitignored, so provide a throwaway value here.
        # CI does not connect to a DB or run migrations (no real LLM key either).
        env:
          DATABASE_URL: "file:./dev.db"
